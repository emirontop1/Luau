name: Deploy LuaBank to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate LuaBank website files
        run: python3 scripts/validate.py

  build-and-publish:
    name: Build site and publish branch
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css script.js _site/
          touch _site/.nojekyll

      - name: Publish to gh-pages branch
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/luabank-pages
          mkdir -p /tmp/luabank-pages
          cp -R _site/. /tmp/luabank-pages/
          cd /tmp/luabank-pages
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy LuaBank site"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
